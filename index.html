<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canciones</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#D8A700;
}

.container{
    display:flex;
    flex-wrap:wrap;
}

.menu{
    width:220px;
    padding:10px;
}

.menu a{
    display:block;
    padding:6px;
    text-decoration:none;
    color:black;
}

.menu a:hover{
    background:#f2c94c;
}

.contenido{
    flex:1;
    text-align:center;
    padding:20px;
}

.contenido img{
    max-width:100%;
    height:auto;
}

.inicio{
    font-size:40px;
    font-weight:bold;
}

/* Adaptación para celular */
@media (max-width:700px){
    .container{
        flex-direction:column;
    }
    .menu{
        width:100%;
    }
}
</style>

<script>
function cambiarContenido(img, txt){
    document.getElementById("inicio").style.display="none";
    document.getElementById("marcoImagen").src="./"+img;
    document.getElementById("marcoTexto").src="./"+txt;
    document.getElementById("marcoImagen").style.display="block";
    document.getElementById("marcoTexto").style.display="block";
}
</script>

</head>
  <body>
    <div class="container">
    <div class="menu">
      
      <a onclick="cambiarContenido('lobohombre.JPG','lobohombreletra.JPG')">Lobo Hombre en Paris</a>

      <a onclick="cambiarContenido('malagente.JPG','malagenteletra.JPG')">Mala Gente</a>
      <a onclick="cambiarContenido('mandaunasenal.JPG','mandaunasenalletra.JPG')">Manda una Señal</a>
      <a onclick="cambiarContenido('hastaque.JPG','hastaqueletra.JPG')">Hasta que te conocí</a>
